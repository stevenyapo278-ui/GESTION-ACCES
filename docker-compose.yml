version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestions_access_db
    environment:
      POSTGRES_DB: gestions_access
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: gestions_access_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestions_access_api
    environment:
      DATABASE_URL: postgresql://app_user:app_password@postgres:5432/gestions_access
      JWT_SECRET: change-this-to-a-very-long-random-string-in-production
      JWT_EXPIRES_IN: 7d
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: gestions-access-uploads
      PORT: 3001
      CORS_ORIGIN: http://localhost:8888
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestions_access_ui
    environment:
      VITE_API_URL: http://localhost:8888/api
    ports:
      - "8888:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
